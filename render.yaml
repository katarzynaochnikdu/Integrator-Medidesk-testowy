# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Aktywny serwis: md-integrator-old (Starter plan).
#
# Playwright na Render — DWA warunki muszą być spełnione:
#  1. buildCommand pobiera binarkę chromium (`playwright install chromium`).
#  2. PLAYWRIGHT_BROWSERS_PATH wskazuje katalog WEWNĄTRZ projektu — domyślny
#     ~/.cache/ms-playwright NIE przeżywa przejścia build→runtime na Render,
#     więc binarka instalowana w buildzie znika do startu. Katalog projektu
#     (/opt/render/project/src) przeżywa. Build i runtime czytają tę samą
#     zmienną, więc instalacja i lookup trafiają w to samo miejsce.
#
# UWAGA: jeśli serwis był utworzony ręcznie (nie z Blueprintu), Render
# IGNORUJE ten plik — wtedy ustaw buildCommand i env var w dashboardzie.
services:
  - type: web
    name: md-integrator-old
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /demo/contact
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.ms-playwright
