# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Aktywny serwis: md-integrator-old (Starter plan).
#
# buildCommand instaluje binarkę Chromium dla Playwright — captcha-bridge
# otwiera app.medidesk.io w headless-browserze i generuje token reCAPTCHA v3.
# UWAGA: bez `--with-deps` (to runęłoby apt-get, który na Render wymaga
# roota i pada w buildzie). Render ma w bazowym obrazie biblioteki
# wystarczające do chrome-headless-shell.
services:
  - type: web
    name: md-integrator-old
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /demo/contact
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
