<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test — wysyłka do Medidesk</title>
<script>
  // Klucz reCAPTCHA Enterprise — z configu, można nadpisać ?key=... do testów.
  window.__RECAPTCHA_KEY = new URLSearchParams(location.search).get("key") || "{{ recaptcha_site_key }}";
  // enterprise.js ładowany dynamicznie z wybranym kluczem (żeby ?key= działał).
  (function(){
    var s = document.createElement("script");
    s.src = "https://www.google.com/recaptcha/enterprise.js?render=" + encodeURIComponent(window.__RECAPTCHA_KEY);
    document.head.appendChild(s);
  })();
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f1117;color:#e4e4e7;font-size:13px}
  .wrap{max-width:32rem;margin:2rem auto;padding:0 1rem}
  h1{font-size:1.1rem;margin-bottom:.2rem}
  .sub{color:#71717a;font-size:.75rem;margin-bottom:1rem}
  .meta{display:inline-flex;gap:.4rem;padding:.3rem .5rem;background:#1a1b23;border-radius:5px;font-size:.68rem;color:#71717a;margin-bottom:1rem}
  .meta code{background:#27272a;padding:1px 4px;border-radius:3px;color:#a1a1aa}
  .presets{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
  .presets button{padding:.35rem .7rem;border:1px solid #27272a;border-radius:6px;background:#1a1b23;color:#d4d4d8;cursor:pointer;font-size:.75rem}
  .presets button:hover{border-color:#3b82f6;color:#fff}
  label{display:block;margin-top:.6rem;font-weight:500;font-size:.75rem;color:#a1a1aa}
  input,select,textarea{width:100%;margin-top:.2rem;padding:.4rem .5rem;background:#1a1b23;border:1px solid #27272a;border-radius:5px;color:#e4e4e7;font-size:.82rem}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6}
  textarea{resize:vertical;min-height:48px}
  select{appearance:none}
  .cb-row{display:flex;align-items:center;gap:.4rem;margin-top:.6rem}
  .cb-row input{width:auto}
  .cb-row label{margin:0;font-weight:400}
  .req{color:#ef4444}
  .row{display:flex;gap:.6rem}
  .row>*{flex:1;min-width:0}
  .btn{margin-top:.8rem;width:100%;padding:.5rem;border:none;border-radius:6px;background:#3b82f6;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-test{background:#27272a;border:1px solid #3f3f46;color:#d4d4d8}
  .btn-test:hover:not(:disabled){border-color:#3b82f6;color:#fff}
  #out{margin-top:.6rem;white-space:pre-wrap;font-size:.7rem;padding:.5rem;border-radius:6px;font-family:monospace;display:none}
  #out.show{display:block}
  .err{color:#fca5a5;background:#1c1215;border:1px solid #7f1d1d}
  .ok{color:#86efac;background:#0f1a14;border:1px solid #14532d}
  .warn{color:#fde68a;background:#1c1a10;border:1px solid #78350f}
</style>
</head>
<body>
<div class="wrap">
  <h1>Test wysyłki do Medidesk</h1>
  <div class="sub">Dynamicznie pobiera pola formularza, wypełnia adekwatnie do typu</div>
  <div class="meta"><span id="fname">…</span> · <code id="fid"></code></div>
  <div class="presets" id="presets"></div>
  <div id="form-container">Ładowanie…</div>
  <div id="out"></div>
</div>
<script>
const FORM_ID = "{{ default_form_id }}";
const RECAPTCHA_KEY = window.__RECAPTCHA_KEY;
const CAPTCHA_ACTION = new URLSearchParams(location.search).get("action") || "submit";

document.getElementById("fid").textContent = FORM_ID;

// Token reCAPTCHA Enterprise generowany w PRZEGLĄDARCE (prawdziwy browser =
// wysoki score). To jest "implementacja", którą zaleca Medidesk (enterprise.js
// + grecaptcha.enterprise.execute). Token leci do /api/submit jako captchaResponse.
function getEnterpriseToken() {
  return new Promise(function(resolve, reject) {
    if (!RECAPTCHA_KEY || !window.grecaptcha || !grecaptcha.enterprise) {
      reject(new Error("grecaptcha.enterprise niedostępne"));
      return;
    }
    grecaptcha.enterprise.ready(function() {
      grecaptcha.enterprise.execute(RECAPTCHA_KEY, {action: CAPTCHA_ACTION}).then(resolve, reject);
    });
  });
}

// Jedno źródło prawdy: każda osoba ma spójny komplet danych. Presety i prefill
// indeksują TĘ SAMĄ listę, więc klik "Marek" zawsze wstawia dane Marka.
// (Wcześniej przyciski [Anna,Marek,Ewa] i pule [Jan,Anna,Marek] były przesunięte
//  → "Marek" wstawiał Annę.)
const PEOPLE = [
  {name: "Anna Nowak",      email: "anna.nowak@example.com",      phone: "+48601234567", subject: "Konsultacja ortopedyczna", address: "ul. Przykładowa 5, Kraków",  note: "Proszę o kontakt po 16:00"},
  {name: "Marek Zieliński", email: "marek.zielinski@example.com", phone: "+48512345678", subject: "Badanie USG",             address: "ul. Demo 8, Gdańsk",       note: "Chciałbym zmienić termin"},
  {name: "Ewa Kowalczyk",   email: "ewa.kowalczyk@example.com",   phone: "+48500600700", subject: "Wizyta kontrolna",        address: "ul. Testowa 12, Warszawa", note: "Wizyta dla dziecka, wiek 8 lat"}
];
// Kolejne pola TEXT_FIELD dostają po kolei: 1. imię i nazwisko, 2. temat, 3. adres.
const TEXT_BY_POS = [function(p){return p.name;}, function(p){return p.subject;}, function(p){return p.address;}];

let fieldsMeta = [];
let textFieldIdx = 0;

function clearOut() {
  var o = document.getElementById("out");
  o.className = ""; o.textContent = "";
}

function prefill(setIdx) {
  textFieldIdx = 0;
  var person = PEOPLE[setIdx % PEOPLE.length];
  fieldsMeta.forEach(function(f) {
    var el = document.querySelector("[name='" + f.fieldId + "']");
    if (!el) return;
    if (f.type === "CHECKBOX") {
      el.checked = true;
    } else if (f.type === "SELECT") {
      if (el.options.length > 0) el.selectedIndex = setIdx % el.options.length;
    } else if (f.type === "EMAIL") {
      el.value = person.email;
    } else if (f.type === "PHONE") {
      el.value = person.phone;
    } else if (f.type === "TEXT_AREA") {
      el.value = person.note;
    } else {
      el.value = TEXT_BY_POS[textFieldIdx % TEXT_BY_POS.length](person);
      textFieldIdx++;
    }
  });
  clearOut();
}

const NAMES = PEOPLE.map(function(p){ return p.name; });
var presetsEl = document.getElementById("presets");
NAMES.forEach(function(name, i) {
  var btn = document.createElement("button");
  btn.textContent = name;
  btn.addEventListener("click", function() { prefill(i); });
  presetsEl.appendChild(btn);
});

fetch("/api/forms/" + FORM_ID + "/fields")
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { document.getElementById("form-container").innerHTML = "<p class='err show'>" + data.error + "</p>"; return; }
    if (data.form_name) document.getElementById("fname").textContent = data.form_name;
    fieldsMeta = data.fields;

    var html = "<form id='f'>";
    var emailAndPhone = [];

    data.fields.forEach(function(f) {
      var label = f.name || f.fieldId;
      var req = f.required ? "<span class='req'> *</span>" : "";

      if (f.type === "EMAIL" || f.type === "PHONE") {
        emailAndPhone.push(f);
        if (emailAndPhone.length === 2) {
          html += "<div class='row'>";
          emailAndPhone.forEach(function(ef) {
            var elabel = ef.name || ef.fieldId;
            var ereq = ef.required ? "<span class='req'> *</span>" : "";
            var t = ef.type === "EMAIL" ? "email" : "tel";
            html += "<div><label>" + elabel + ereq + "</label><input type='" + t + "' name='" + ef.fieldId + "'" + (ef.required ? " required" : "") + " /></div>";
          });
          html += "</div>";
          emailAndPhone = [];
        }
        return;
      }

      if (f.type === "CHECKBOX") {
        html += "<div class='cb-row'><input type='checkbox' name='" + f.fieldId + "' value='true' /><label>" + label + "</label></div>";
      } else if (f.type === "SELECT" && f.options) {
        html += "<div><label>" + label + req + "</label><select name='" + f.fieldId + "'>";
        f.options.forEach(function(o) { html += "<option value='" + o + "'>" + o + "</option>"; });
        html += "</select></div>";
      } else if (f.type === "TEXT_AREA") {
        html += "<div><label>" + label + req + "</label><textarea name='" + f.fieldId + "'" + (f.required ? " required" : "") + "></textarea></div>";
      } else {
        html += "<div><label>" + label + req + "</label><input type='text' name='" + f.fieldId + "'" + (f.required ? " required" : "") + " /></div>";
      }
    });

    // leftover email/phone not paired
    emailAndPhone.forEach(function(ef) {
      var elabel = ef.name || ef.fieldId;
      var ereq = ef.required ? "<span class='req'> *</span>" : "";
      var t = ef.type === "EMAIL" ? "email" : "tel";
      html += "<div><label>" + elabel + ereq + "</label><input type='" + t + "' name='" + ef.fieldId + "'" + (ef.required ? " required" : "") + " /></div>";
    });

    html += "<button type='submit' class='btn'>Wyślij do Medidesk</button>";
    html += "<button type='button' id='captcha-test' class='btn btn-test'>Test captcha: zły token → dobry token</button>";
    html += "</form>";
    document.getElementById("form-container").innerHTML = html;

    var formEl = document.getElementById("f");
    var out = document.getElementById("out");

    // Zbiera wartości pól z formularza (bez tokenu captchy).
    function collectBody() {
      var fd = new FormData(formEl);
      var body = {};
      for (var pair of fd.entries()) body[pair[0]] = pair[1];
      data.fields.forEach(function(f) {
        if (f.type === "CHECKBOX" && !fd.has(f.fieldId)) body[f.fieldId] = "false";
      });
      body.siteDomain = location.hostname;
      body.siteUrl = location.pathname;
      return body;
    }

    // POST leada; zawsze zwraca {status, data} (nawet gdy body nie jest JSON-em).
    function postLead(body) {
      return fetch("/api/submit/" + FORM_ID, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)})
        .then(function(r) { return r.json().then(function(d){ return {status: r.status, data: d}; }, function(){ return {status: r.status, data: null}; }); });
    }

    // Normalna wysyłka: prawdziwy token enterprise wygenerowany w przeglądarce.
    formEl.addEventListener("submit", function(e) {
      e.preventDefault();
      var btn = formEl.querySelector("button[type='submit']");
      btn.disabled = true; btn.textContent = "captcha…";
      out.className = ""; out.textContent = "";
      var body = collectBody();
      getEnterpriseToken()
        .then(function(token) {
          body.captchaResponse = token;
          btn.textContent = "wysyłanie…";
          return postLead(body);
        })
        .then(function(res) {
          out.className = (res.status === 200 ? "ok show" : "err show");
          out.textContent = res.status === 200 ? "OK — lead wysłany do Medidesk 🎉" : ("Błąd " + res.status + "\n" + JSON.stringify(res.data, null, 2));
          btn.disabled = false; btn.textContent = "Wyślij do Medidesk";
        })
        .catch(function(err) { out.className = "err show"; out.textContent = "captcha/wysyłka: " + err; btn.disabled = false; btn.textContent = "Wyślij do Medidesk"; });
    });

    // Test captchy: ten sam lead wysłany 2×. Najpierw ZŁY token (zaślepka),
    // potem PRAWDZIWY. Porównanie statusów mówi, czy Medidesk weryfikuje
    // captchę i czy nasz token przechodzi. Zaślepka, bo całkiem bez tokenu
    // serwer sam dociągnąłby token z solvera (→ test byłby niewiarygodny).
    var BAD_TOKEN = "INVALID_TOKEN_CAPTCHA_TEST";
    document.getElementById("captcha-test").addEventListener("click", function() {
      var tbtn = document.getElementById("captcha-test");
      var sbtn = formEl.querySelector("button[type='submit']");
      tbtn.disabled = true; sbtn.disabled = true;
      tbtn.textContent = "test: zły token…";
      out.className = "show"; out.textContent = "Test captchy — wysyłam 2 leady…\n";

      var base = collectBody();
      var r1 = null;
      postLead(Object.assign({}, base, {captchaResponse: BAD_TOKEN}))
        .then(function(res1) {
          r1 = res1;
          tbtn.textContent = "test: dobry token…";
          return getEnterpriseToken();
        })
        .then(function(token) {
          return postLead(Object.assign({}, base, {captchaResponse: token}));
        })
        .then(function(r2) {
          renderVerdict(r1, r2);
          tbtn.disabled = false; sbtn.disabled = false;
          tbtn.textContent = "Test captcha: zły token → dobry token";
        })
        .catch(function(err) {
          out.className = "err show";
          out.textContent = "Test przerwany: " + err + "\n(szot 1 status: " + (r1 ? r1.status : "—") + ")";
          tbtn.disabled = false; sbtn.disabled = false;
          tbtn.textContent = "Test captcha: zły token → dobry token";
        });
    });

    // Interpretacja dwóch szotów → werdykt o stanie captchy i przejściu tokenu.
    function renderVerdict(bad, good) {
      var lines = [
        "Zły token (zaślepka):  HTTP " + bad.status,
        "Dobry token (real):    HTTP " + good.status,
        ""
      ];
      var cls, verdict;
      if (bad.status === 200 && good.status === 200) {
        cls = "warn"; verdict = "⚠️ Captcha WYŁĄCZONA — Medidesk przyjął nawet zły token. Twoje 200 przechodzą bez weryfikacji; tokenu nie ma jak sprawdzić, dopóki captcha nie wróci.";
      } else if (bad.status !== 200 && good.status === 200) {
        cls = "ok"; verdict = "✅ Captcha WŁĄCZONA i Twój token PRZECHODZI. Zły token odrzucony, prawdziwy przyjęty — działa end-to-end.";
      } else if (bad.status !== 200 && good.status !== 200) {
        cls = "err"; verdict = "❌ Captcha WŁĄCZONA, ale prawdziwy token NIE przechodzi (score / action / site-key). Sprawdź solver i klucz.";
      } else {
        cls = "err"; verdict = "❓ Anomalia: zły token przeszedł, a prawdziwy nie. Zobacz surowe odpowiedzi.";
      }
      lines.push(verdict);
      if (good.status !== 200 && good.data) lines.push("\nDobry → " + JSON.stringify(good.data));
      if (bad.status !== 200 && bad.data) lines.push("Zły → " + JSON.stringify(bad.data));
      out.className = cls + " show";
      out.textContent = lines.join("\n");
    }

    prefill(0);
  })
  .catch(function(err) { document.getElementById("form-container").innerHTML = "<p class='err show'>" + err + "</p>"; });
</script>
</body>
</html>
