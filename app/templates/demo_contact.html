<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test — wysyłka do Medidesk</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f1117;color:#e4e4e7;font-size:13px}
  .wrap{max-width:32rem;margin:2rem auto;padding:0 1rem}
  h1{font-size:1.1rem;margin-bottom:.2rem}
  .sub{color:#71717a;font-size:.75rem;margin-bottom:1rem}
  .meta{display:inline-flex;gap:.4rem;padding:.3rem .5rem;background:#1a1b23;border-radius:5px;font-size:.68rem;color:#71717a;margin-bottom:1rem}
  .meta code{background:#27272a;padding:1px 4px;border-radius:3px;color:#a1a1aa}
  .presets{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
  .presets button{padding:.35rem .7rem;border:1px solid #27272a;border-radius:6px;background:#1a1b23;color:#d4d4d8;cursor:pointer;font-size:.75rem}
  .presets button:hover{border-color:#3b82f6;color:#fff}
  label{display:block;margin-top:.6rem;font-weight:500;font-size:.75rem;color:#a1a1aa}
  input,select,textarea{width:100%;margin-top:.2rem;padding:.4rem .5rem;background:#1a1b23;border:1px solid #27272a;border-radius:5px;color:#e4e4e7;font-size:.82rem}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6}
  textarea{resize:vertical;min-height:48px}
  select{appearance:none}
  .cb-row{display:flex;align-items:center;gap:.4rem;margin-top:.6rem}
  .cb-row input{width:auto}
  .cb-row label{margin:0;font-weight:400}
  .req{color:#ef4444}
  .row{display:flex;gap:.6rem}
  .row>*{flex:1;min-width:0}
  .btn{margin-top:.8rem;width:100%;padding:.5rem;border:none;border-radius:6px;background:#3b82f6;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  #out{margin-top:.6rem;white-space:pre-wrap;font-size:.7rem;padding:.5rem;border-radius:6px;font-family:monospace;display:none}
  #out.show{display:block}
  .err{color:#fca5a5;background:#1c1215;border:1px solid #7f1d1d}
  .ok{color:#86efac;background:#0f1a14;border:1px solid #14532d}
</style>
</head>
<body>
<div class="wrap">
  <h1>Test wysyłki do Medidesk</h1>
  <div class="sub">Dynamicznie pobiera pola formularza, wypełnia adekwatnie do typu</div>
  <div class="meta"><span id="fname">…</span> · <code id="fid"></code></div>
  <div class="presets" id="presets"></div>
  <div id="form-container">Ładowanie…</div>
  <div id="out"></div>
</div>
<script>
const FORM_ID = "{{ default_form_id }}";

document.getElementById("fid").textContent = FORM_ID;

const FAKE = {
  TEXT_FIELD: [
    ["Jan Kowalski", "Anna Nowak", "Marek Zieliński"],
    ["Wizyta kontrolna", "Konsultacja ortopedyczna", "Badanie USG"],
    ["ul. Testowa 12, Warszawa", "ul. Przykładowa 5, Kraków", "ul. Demo 8, Gdańsk"]
  ],
  EMAIL: ["jan.test@example.com", "anna.nowak@example.com", "marek.z@example.com"],
  PHONE: ["+48500600700", "+48601234567", "+48512345678"],
  TEXT_AREA: ["Proszę o kontakt po 16:00", "Wizyta dla dziecka, wiek 8 lat", "Chciałbym zmienić termin"],
  CHECKBOX: ["true", "true", "true"],
  SELECT: null
};

let fieldsMeta = [];
let textFieldIdx = 0;

function prefill(setIdx) {
  textFieldIdx = 0;
  fieldsMeta.forEach(f => {
    const el = document.querySelector("[name='" + f.fieldId + "']");
    if (!el) return;
    if (f.type === "CHECKBOX") {
      el.checked = true;
    } else if (f.type === "SELECT") {
      const opts = el.options;
      if (opts.length > 0) el.selectedIndex = setIdx % opts.length;
    } else if (f.type === "EMAIL") {
      el.value = FAKE.EMAIL[setIdx];
    } else if (f.type === "PHONE") {
      el.value = FAKE.PHONE[setIdx];
    } else if (f.type === "TEXT_AREA") {
      el.value = FAKE.TEXT_AREA[setIdx];
    } else {
      const pool = FAKE.TEXT_FIELD[textFieldIdx % FAKE.TEXT_FIELD.length];
      el.value = pool[setIdx];
      textFieldIdx++;
    }
  });
  document.getElementById("out").className = "";
  document.getElementById("out").textContent = "";
}

const NAMES = ["Anna Nowak", "Marek Zieliński", "Ewa Kowalczyk"];
var presetsEl = document.getElementById("presets");
NAMES.forEach(function(name, i) {
  var btn = document.createElement("button");
  btn.textContent = name;
  btn.addEventListener("click", function() { prefill(i); });
  presetsEl.appendChild(btn);
});

fetch("/api/forms/" + FORM_ID + "/fields")
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { document.getElementById("form-container").innerHTML = "<p class='err show'>" + data.error + "</p>"; return; }
    if (data.form_name) document.getElementById("fname").textContent = data.form_name;
    fieldsMeta = data.fields;

    var html = "<form id='f'>";
    var emailAndPhone = [];

    data.fields.forEach(function(f) {
      var label = f.name || f.fieldId;
      var req = f.required ? "<span class='req'> *</span>" : "";

      if (f.type === "EMAIL" || f.type === "PHONE") {
        emailAndPhone.push(f);
        if (emailAndPhone.length === 2) {
          html += "<div class='row'>";
          emailAndPhone.forEach(function(ef) {
            var elabel = ef.name || ef.fieldId;
            var ereq = ef.required ? "<span class='req'> *</span>" : "";
            var t = ef.type === "EMAIL" ? "email" : "tel";
            html += "<div><label>" + elabel + ereq + "</label><input type='" + t + "' name='" + ef.fieldId + "'" + (ef.required ? " required" : "") + " /></div>";
          });
          html += "</div>";
          emailAndPhone = [];
        }
        return;
      }

      if (f.type === "CHECKBOX") {
        html += "<div class='cb-row'><input type='checkbox' name='" + f.fieldId + "' value='true' /><label>" + label + "</label></div>";
      } else if (f.type === "SELECT" && f.options) {
        html += "<div><label>" + label + req + "</label><select name='" + f.fieldId + "'>";
        f.options.forEach(function(o) { html += "<option value='" + o + "'>" + o + "</option>"; });
        html += "</select></div>";
      } else if (f.type === "TEXT_AREA") {
        html += "<div><label>" + label + req + "</label><textarea name='" + f.fieldId + "'" + (f.required ? " required" : "") + "></textarea></div>";
      } else {
        html += "<div><label>" + label + req + "</label><input type='text' name='" + f.fieldId + "'" + (f.required ? " required" : "") + " /></div>";
      }
    });

    // leftover email/phone not paired
    emailAndPhone.forEach(function(ef) {
      var elabel = ef.name || ef.fieldId;
      var ereq = ef.required ? "<span class='req'> *</span>" : "";
      var t = ef.type === "EMAIL" ? "email" : "tel";
      html += "<div><label>" + elabel + ereq + "</label><input type='" + t + "' name='" + ef.fieldId + "'" + (ef.required ? " required" : "") + " /></div>";
    });

    html += "<button type='submit' class='btn'>Wyślij do Medidesk</button></form>";
    document.getElementById("form-container").innerHTML = html;

    document.getElementById("f").addEventListener("submit", function(e) {
      e.preventDefault();
      var btn = e.target.querySelector(".btn");
      var out = document.getElementById("out");
      btn.disabled = true;
      btn.textContent = "wysyłanie…";
      out.textContent = ""; out.className = "";

      var fd = new FormData(e.target);
      var body = {};
      for (var pair of fd.entries()) body[pair[0]] = pair[1];
      data.fields.forEach(function(f) {
        if (f.type === "CHECKBOX" && !fd.has(f.fieldId)) body[f.fieldId] = "false";
      });
      body.siteDomain = location.hostname;
      body.siteUrl = location.pathname;

      fetch("/api/submit/" + FORM_ID, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)})
        .then(function(r) { return r.json().then(function(d) { return {status: r.status, data: d}; }); })
        .then(function(res) {
          out.classList.add("show");
          out.className = res.status === 200 ? "ok show" : "err show";
          out.textContent = res.status === 200 ? "OK — lead wysłany do Medidesk" : "Błąd " + res.status + "\n" + JSON.stringify(res.data, null, 2);
          btn.disabled = false; btn.textContent = "Wyślij do Medidesk";
        })
        .catch(function(err) { out.classList.add("show"); out.className = "err show"; out.textContent = "" + err; btn.disabled = false; btn.textContent = "Wyślij do Medidesk"; });
    });

    prefill(0);
  })
  .catch(function(err) { document.getElementById("form-container").innerHTML = "<p class='err show'>" + err + "</p>"; });
</script>
</body>
</html>
